name: Claude Code Agent
description: >-
  Agentic loop of Claude Code CLI.
  Each prompt state outputs { action, message, nextState }.
  Actions (tools + human input) execute, then results
  flow into the next prompt state.
version: '1.0'
exported_at: '2026-03-02T00:00:00.000Z'
states:
  - id: orchestrator
    type: prompt
    label: Orchestrator
    description: >-
      Entry point for every turn. Receives user message + context
      (system prompt, CLAUDE.md, memory, git status). Classifies
      intent and routes to the right state.
    tools:
      # read / search
      - file_read
      - code_search
      - web_search
      # memory
      - memory_read
    human_input: true
    output_format: '{ action, message, nextState }'
    next_states:
      - Analyze
      - Execute
      - Plan
      - Respond

  - id: analyze
    type: prompt
    label: Analyze
    description: >-
      Explore codebase to build understanding. Search files, read code,
      check memory. Self-loops until enough context is gathered.
    tools:
      # read / search
      - file_read
      - code_search
      - web_search
      - db_query
      # memory
      - memory_read
      - memory_write
    human_input: false
    output_format: '{ action, message, nextState }'
    next_states:
      - Analyze
      - Execute
      - Plan

  - id: plan
    type: prompt
    label: Plan
    description: >-
      Read-only exploration for complex tasks. Design approach, write
      plan, present for user approval. No edits allowed. Self-loops
      while exploring.
    tools:
      # read / search
      - file_read
      - code_search
      - web_search
      # memory
      - memory_read
    human_input: true
    output_format: '{ action, message, nextState }'
    next_states:
      - Plan
      - Execute
      - Orchestrator

  - id: act
    type: prompt
    label: Execute
    description: >-
      Run tools. Independent calls in parallel, dependent calls
      sequential. Self-loops for multi-step operations.
      Sub-agents spawned for parallelizable work.
    tools:
      # read / search
      - file_read
      - code_search
      - web_search
      - db_query
      # write / execute
      - file_write
      - code_interpreter
      - shell
      - api_call
      # memory
      - memory_read
      - memory_write
    human_input: true
    output_format: '{ action, message, nextState }'
    next_states:
      - Execute
      - Evaluate

  - id: evaluate
    type: prompt
    label: Evaluate
    description: >-
      Inspect tool results. Did edits apply? Did builds pass?
      Route based on outcome. Self-loops for quick verification.
      Persists learnings to memory when useful patterns found.
    tools:
      # read / search
      - file_read
      - code_search
      # write / execute
      - file_write
      - shell
      # memory
      - memory_read
      - memory_write
    human_input: false
    output_format: '{ action, message, nextState }'
    next_states:
      - Evaluate
      - Execute
      - Respond
      - Orchestrator

  - id: respond
    type: prompt
    label: Respond
    description: >-
      Synthesize final response. Summarize changes, provide
      file:line references, markdown formatted. Includes
      sources when web search was used.
    tools:
      # memory
      - memory_write
    human_input: false
    output_format: '{ action, message, nextState }'
    next_states:
      - Orchestrator

transitions:
  # Orchestrator routes
  - from: orchestrator
    to: analyze
    type: conditional
    condition: needs codebase understanding
    passes: user_message, intent, relevant_context

  - from: orchestrator
    to: act
    type: conditional
    condition: clear task, ready to execute
    passes: intent, action_plan, target_files[]

  - from: orchestrator
    to: plan
    type: conditional
    condition: complex task, needs design
    passes: task_description, identified_files[]

  - from: orchestrator
    to: respond
    type: conditional
    condition: simple question, no tools needed
    passes: user_message, context

  # Analyze
  - from: analyze
    to: analyze
    type: conditional
    condition: need more info
    passes: partial_findings, next_targets[]

  - from: analyze
    to: act
    type: conditional
    condition: understood enough, ready to execute
    passes: intent, relevant_files[], action_plan

  - from: analyze
    to: plan
    type: conditional
    condition: complex, needs planning
    passes: task_description, codebase_context

  # Plan
  - from: plan
    to: plan
    type: conditional
    condition: still exploring
    passes: partial_plan, files_to_check[]

  - from: plan
    to: act
    type: conditional
    condition: user approved plan
    passes: plan_steps[], target_files[]

  - from: plan
    to: orchestrator
    type: conditional
    condition: needs user clarification
    passes: question, options[]

  # Execute <-> Evaluate loop
  - from: act
    to: act
    type: conditional
    condition: more tools needed
    passes: intermediate_results, pending_ops[]

  - from: act
    to: evaluate
    type: conditional
    condition: tools returned results
    passes: tool_results[], files_modified[], errors[]

  - from: evaluate
    to: evaluate
    type: conditional
    condition: quick verification
    passes: check_target, expected_outcome

  - from: evaluate
    to: act
    type: conditional
    condition: more work needed
    passes: error_info, fix_instructions

  - from: evaluate
    to: respond
    type: conditional
    condition: task complete
    passes: summary, files_changed[]

  - from: evaluate
    to: orchestrator
    type: conditional
    condition: hit blocker, need user input
    passes: blocker_description, options[]

  # Respond
  - from: respond
    to: orchestrator
    type: always
    passes: response_delivered, awaiting_next_message
